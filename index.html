<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Занимательная таблица</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap');

        :root {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --accent-color: #8b5cf6;
            --sidebar-bg: rgba(30, 41, 59, 0.7);
            --grid-bg: #1e293b;
            --cell-bg: #334155;
            --cell-hover: #475569;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --font-family: 'Manrope', sans-serif;

            --border-color-subtle: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.2);
            --text-color-subtle: #94a3b8;

            --shadow-color: 0 0 0;
            --shadow-strength: 20%;

            --shadow-sm: 0 1px 2px -1px hsl(var(--shadow-color) / calc(var(--shadow-strength) + 9%));
            --shadow-md: 0 3px 4px -2px hsl(var(--shadow-color) / calc(var(--shadow-strength) + 9%)), 0 2px 8px -4px hsl(var(--shadow-color) / calc(var(--shadow-strength) + 7%));
            --shadow-lg: 0 10px 15px -3px hsl(var(--shadow-color) / calc(var(--shadow-strength) + 10%)), 0 4px 6px -2px hsl(var(--shadow-color) / calc(var(--shadow-strength) + 5%));

            --gold: #fbbf24;
            --silver: #e2e8f0;
            --bronze: #b45309;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            max-width: 1600px;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color-subtle);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            z-index: 10;
            transition: width 0.3s ease, padding 0.3s ease;
        }

        .sidebar h1 {
            font-size: 2rem;
            line-height: 1.1;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            font-weight: 700;
            text-align: center;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .control-group label {
            font-size: 0.875rem;
            color: var(--text-color-subtle);
            font-weight: 500;
        }

        .control-description {
            text-align: center;
            margin-top: 0.25rem;
            color: var(--text-color-subtle);
            font-size: 0.8rem;
            height: 1.2em;
        }

        /* Modern Toggle Buttons */
        .toggle-group {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 9px;
            padding: 4px;
            border: 1px solid var(--border-color-subtle);
        }

        .toggle-btn {
            all: unset;
            flex: 1;
            text-align: center;
            color: var(--text-color-subtle);
            padding: 6px 4px;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            font-size: 0.875rem;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
        }

        .toggle-btn.active {
            background: var(--primary-color);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .toggle-btn.active:hover {
            background: var(--primary-hover);
            color: white;
        }

        /* Modern Checkbox */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            color: var(--text-color) !important;
            font-weight: 500 !important;
            font-size: 1rem !important;
        }

        .checkbox-label input {
            display: none;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--cell-hover);
            border-radius: 4px;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .checkbox-label input:checked+.custom-checkbox {
            background: var(--success-color);
            border-color: var(--success-color);
        }

        .checkbox-label input:checked+.custom-checkbox::after {
            content: '\2713';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: white;
            font-weight: bold;
        }

        /* Modern Buttons */
        .primary-btn, .secondary-btn {
            all: unset;
            box-sizing: border-box;
            display: block;
            text-align: center;
            padding: 0.8rem 1.25rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            width: 100%;
            font-family: inherit;
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .primary-btn:active {
            transform: translateY(0);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-color);
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Status Panel */
        .status-panel {
            margin-top: auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s linear 0.3s, opacity 0.3s ease;
        }

        body.game-active .status-panel {
            visibility: visible;
            opacity: 1;
            transition-delay: 0s;
        }

        .timer-display, .target-display {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .memory-timer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.35rem 0.6rem;
            border-radius: 10px;
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.35);
        }

        .memory-timer.is-hidden {
            display: none;
        }

        .memory-label {
            color: var(--text-color-subtle);
            font-size: 0.75rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .memory-countdown {
            font-family: monospace;
            font-size: 0.95rem;
            font-weight: 700;
            color: #bfdbfe;
        }

        .timer-label, .target-label {
            color: var(--text-color-subtle);
            font-size: 0.9rem;
        }

        #timer {
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .current-target {
            font-size: 2rem;
            font-weight: 700;
            color: var(--success-color);
        }

        /* Game Area */
        .game-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            padding: 1rem;
            background: var(--grid-bg);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color-subtle);
        }

        body:not(.game-active) .grid-container {
            display: none;
        }

        .grid-cell {
            background: var(--cell-bg);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            color: var(--text-color);
        }

        .grid-cell:hover {
            transform: scale(1.05);
            z-index: 1;
            background: var(--cell-hover);
            filter: brightness(1.1);
        }

        .grid-cell:active {
            transform: scale(0.95);
        }

        /* Mosaic SVG Styles */
        .mosaic-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        .mosaic-path {
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 2;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mosaic-path:hover {
            filter: brightness(1.1);
            transform-origin: center;
            stroke: rgba(255, 255, 255, 0.5);
            stroke-width: 3;
            z-index: 10;
        }

        .mosaic-path:active {
            filter: brightness(0.9);
        }

        .mosaic-path.marked {
            opacity: 0.3;
            pointer-events: none;
            fill: #334155 !important;
            filter: grayscale(1);
        }

        .mosaic-path.marked:has(+ text:not(.hidden-text)) {
            opacity: 1;
        }

        .mosaic-path.shake {
            animation: shake 0.3s ease-in-out;
            fill: var(--danger-color) !important;
        }

        .mosaic-text {
            pointer-events: none;
            font-weight: 700;
            fill: var(--text-color);
            text-anchor: middle;
            dominant-baseline: middle;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease;
        }

        .hidden-text {
            opacity: 0 !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .grid-cell.shake {
            animation: shake 0.3s ease-in-out;
            background-color: var(--danger-color) !important;
        }

        .grid-cell.marked {
            opacity: 0.3;
            pointer-events: none;
            transform: scale(0.9);
            filter: grayscale(1);
        }

        .grid-cell.marked:not(.hidden-text) {
            opacity: 1;
        }

        /* Modal & Start Screen */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 0.3s, visibility 0.3s;
            z-index: 20;
            visibility: visible;
        }

        .modal.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .modal-content {
            background: var(--grid-bg);
            padding: 2.5rem;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--border-color-subtle);
            box-shadow: var(--shadow-lg);
            transform: scale(1);
            transition: transform 0.3s;
            width: 90%;
            max-width: 420px;
        }

        .modal.hidden .modal-content {
            transform: scale(0.8);
        }

        .modal h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--success-color);
        }

        .modal p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: var(--text-color-subtle);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-actions .primary-btn,
        .modal-actions .secondary-btn {
            flex: 1;
        }

        /* Start Panel Specifics */
        .start-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
        }

        .input-group label {
            color: var(--text-color-subtle);
            font-size: 0.9rem;
            margin-left: 4px;
        }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.9rem;
            color: white;
            font-size: 1.1rem;
            font-family: inherit;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        input[type="range"] {
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        /* Leaderboard */
        .leaderboard-section {
            margin-top: 1.5rem;
            border-top: 1px solid var(--border-color-subtle);
            padding-top: 1.5rem;
        }

        .leaderboard-section h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .leaderboard-toggle {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .sm-toggle {
            all: unset;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-color-subtle);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .sm-toggle.active {
            background: var(--primary-color);
            color: white;
        }

        .leaderboard-container {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            padding: 10px;
            text-align: left;
            color: #cbd5e1;
        }

        .leaderboard-table th {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            font-weight: 500;
            position: sticky;
            top: 0;
        }

        .leaderboard-table tr:not(:last-child) {
            border-bottom: 1px solid var(--border-color-subtle);
        }

        .leaderboard-table tr.rank-gold td {
            font-weight: 700;
            color: var(--gold);
        }

        .leaderboard-table tr.rank-silver td {
            font-weight: 700;
            color: var(--silver);
        }

        .leaderboard-table tr.rank-bronze td {
            font-weight: 700;
            color: var(--bronze);
        }


        /* Responsive Design */
        @media (max-width: 800px) {
            .app-container {
                flex-direction: column;
                overflow-y: auto;
                height: 100%;
            }

            .sidebar {
                width: 100%;
                height: auto;
                padding: 1rem;
                gap: 1.5rem;
                flex-direction: column;
                align-items: stretch;
                border-right: none;
                border-bottom: 1px solid var(--border-color-subtle);
            }

            .sidebar h1 {
                font-size: 1.5rem;
                text-align: center;
                margin-bottom: 0;
            }

            .controls {
                flex-direction: column;
                gap: 1.5rem;
            }

            .status-panel {
                width: 100%;
                flex-direction: row;
                justify-content: space-around;
                margin-top: 0;
                background: none;
                padding: 0;
            }

            .game-area {
                padding: 1rem;
                flex-grow: 1;
            }

            .grid-container {
                max-width: 95vw;
                gap: 8px;
                padding: 8px;
            }

            body:not(.game-active) .game-area {
                align-items: flex-start;
            }

            #start-screen.modal {
                position: static;
                height: auto;
                width: 100%;
                background: none;
                backdrop-filter: none;
                padding: 0;
                display: block;
            }

            #start-screen .modal-content.start-panel {
                padding: 1rem;
                box-shadow: none;
                border: none;
                max-width: none;
                border-radius: 0;
                background: transparent;
            }

            body.game-active #start-screen {
                display: none;
            }

            body.game-active .app-container .sidebar .controls,
            body.game-active .app-container .sidebar h1 {
                display: none !important;
            }

            body.game-active .sidebar {
                justify-content: center;
                padding: 0.5rem;
            }

            body.game-active .status-panel {
                width: 100%;
                margin: 0;
                padding: 0.5rem 1rem;
            }
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.8);
            transition: all 0.3s ease;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>Занимательная<br>Таблица</h1>

            <div class="controls">
                <div class="control-group">
                    <label>Игровое поле</label>
                    <div class="toggle-group">
                        <button id="btn-grid" class="toggle-btn" data-value="grid">Сетка</button>
                        <button id="btn-mosaic" class="toggle-btn active" data-value="mosaic">Мозаика</button>
                    </div>
                </div>

                <div class="control-group">
                    <label for="grid-size">Размер поля: <span id="grid-size-val">5x5 (25)</span></label>
                    <input type="range" id="grid-size" min="3" max="10" value="5" step="1" class="slider">
                </div>

                <div class="control-group">
                    <label>Направление</label>
                    <div class="toggle-group">
                        <button id="btn-asc" class="toggle-btn active" data-value="asc">1 ➔ 25</button>
                        <button id="btn-desc" class="toggle-btn" data-value="desc">25 ➔ 1</button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="check-mark">
                        <span class="custom-checkbox"></span>
                        Помечать найденные
                    </label>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="check-memory">
                        <span class="custom-checkbox"></span>
                        Игра на память
                    </label>
                </div>

                <div class="control-group">
                    <label>Цветовые темы</label>
                    <div class="toggle-group" id="color-controls">
                        <button class="toggle-btn" data-value="bw" data-description="Черно-белая тема игры" title="Ч/Б">Black</button>
                        <button class="toggle-btn active" data-value="bg" data-description="Цветной фон, белые числа" title="Фон">ColorF</button>
                        <button class="toggle-btn" data-value="text" data-description="Темный фон, цветные числа" title="Текст">ColorN</button>
                        <button class="toggle-btn" data-value="full" data-description="Цветной фон, цветные числа" title="Full">ColorFN</button>
                    </div>
                    <p id="color-theme-description" class="control-description"></p>
                </div>
            </div>

            <div class="status-panel">
                <div class="timer-display">
                    <span class="timer-label">Время</span>
                    <span id="timer">00:00.00</span>
                </div>
                <div id="memory-timer" class="memory-timer is-hidden" aria-live="polite">
                    <span class="memory-label">Скрытие</span>
                    <span id="memory-countdown" class="memory-countdown">10.0с</span>
                </div>
                <div class="target-display">
                    <span class="target-label">Ищи число</span>
                    <span id="target-num" class="current-target">-</span>
                </div>
            </div>
        </aside>

        <main class="game-area">
            <div id="grid-container" class="grid-container">
                <!-- Grid items generated by JS -->
            </div>

            <!-- Start Screen Overlay -->
            <div id="start-screen" class="modal">
                <div class="modal-content start-panel">
                    <div class="input-group">
                        <label for="player-name">Твое имя:</label>
                        <input type="text" id="player-name" placeholder="Игрок 1" maxlength="15">
                    </div>

                    <button id="btn-start-game" class="primary-btn">Начать игру</button>

                    <div class="leaderboard-section">
                        <h3>Лучшие результаты</h3>
                        <div class="leaderboard-toggle">
                            <button id="lb-btn-grid" class="sm-toggle active">Сетка</button>
                            <button id="lb-btn-mosaic" class="sm-toggle">Мозаика</button>
                        </div>
                        <div class="leaderboard-container">
                            <table class="leaderboard-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Имя</th>
                                        <th>Время</th>
                                    </tr>
                                </thead>
                                <tbody id="leaderboard-body">
                                    <!-- Rows generated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div id="victory-modal" class="modal hidden">
                <div class="modal-content">
                    <h2>Победа!</h2>
                    <p>Твое время: <span id="final-time"></span></p>
                    <div class="modal-actions">
                        <button id="btn-modal-restart" class="primary-btn">Сыграть еще</button>
                        <button id="btn-modal-quit" class="secondary-btn">Выйти</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        class Game {
            constructor() {
                this.gridSize = 5;
                this.numbers = [];
                this.currentTargetIndex = 0;
                this.startTime = 0;
                this.timerInterval = null;
                this.isPlaying = false;
                this.memoryCountdownInterval = null;
                this.memoryPreviewDuration = 10000;

                // Settings
                this.settings = {
                    mode: 'mosaic', // 'grid' or 'mosaic'
                    direction: 'asc',
                    markFound: false,
                    memoryMode: false,
                    colorMode: 'bg' // 'bw', 'bg', 'text', 'full'
                };

                this.isMemoryPreview = false;
                this.memoryHideTimeout = null;

                // DOM Elements
                this.gridContainer = document.getElementById('grid-container');
                this.timerDisplay = document.getElementById('timer');
                this.targetDisplay = document.getElementById('target-num');

                // Data
                this.playerName = localStorage.getItem('mosaic_player_name') || 'Игрок 1';
                this.leaderboard = JSON.parse(localStorage.getItem('mosaic_leaderboard')) || [];

                this.ui = null; // Will be set by main.js
            }

            get totalCells() {
                return this.gridSize * this.gridSize;
            }

            get colors() {
                return [
                    '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981',
                    '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1', '#8b5cf6',
                    '#d946ef', '#f43f5e', '#fbbf24', '#a3e635', '#34d399',
                    '#22d3ee', '#60a5fa', '#818cf8', '#a78bfa', '#e879f9',
                    '#fb7185', '#fdba74', '#fde047', '#bef264', '#6ee7b7'
                ];
            }

            init(autoStart = false) {
                this.stopTimer();
                this.timerDisplay.textContent = '00:00.00';
                this.resetGame();
                this.ui.setMemoryCountdownVisible(false);

                if (autoStart) {
                    this.isPlaying = true;
                    this.ui.updateUIVisibility('game');
                    this.ui.setControlsState(false);
                } else {
                    this.isPlaying = false;
                    this.ui.updateUIVisibility('start');
                    this.ui.setControlsState(true);
                }

                this.numbers = Array.from({ length: this.totalCells }, (_, i) => i + 1);
                this.shuffle(this.numbers);

                this.currentTargetIndex = 0;
                this.ui.updateTargetDisplay(this.getCurrentTargetNumber());

                this.gridContainer.style.gridTemplateColumns = `repeat(${this.gridSize}, 1fr)`;

                if (this.settings.mode === 'grid') {
                    this.ui.renderGrid(this);
                } else {
                    this.ui.renderMosaic(this);
                }

                if (autoStart) {
                    this.startTimer();
                    if (this.settings.memoryMode) {
                        this.isMemoryPreview = true;
                        this.startMemoryHideTimer();
                    }
                }
            }

            shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            handleCellClick(element, num) {
                if (!this.isPlaying || this.isMemoryPreview) return;

                const expectedNum = this.getCurrentTargetNumber();

                if (num === expectedNum) {
                    if (this.settings.markFound) {
                        this.ui.markCell(element);
                    }

                    if (this.isGameComplete()) {
                        this.victory();
                    } else {
                        this.currentTargetIndex++;
                        this.ui.updateTargetDisplay(this.getCurrentTargetNumber());
                    }
                } else {
                    this.ui.shakeCell(element);
                    if (this.settings.memoryMode) {
                        this.ui.revealNumberTemporarily(element);
                        this.resetFound();
                    }
                }
            }

            resetFound() {
                this.currentTargetIndex = 0;
                this.ui.updateTargetDisplay(this.getCurrentTargetNumber());
                this.ui.resetAllCells(this.settings.mode, this.settings.memoryMode);

                if (this.settings.memoryMode) {
                    this.ui.showAllNumbers();
                    this.startMemoryHideTimer();
                }
            }

            startMemoryHideTimer() {
                this.stopMemoryHideTimer();
                this.isMemoryPreview = true;
                const endTime = Date.now() + this.memoryPreviewDuration;

                this.ui.setMemoryCountdownVisible(true);
                this.updateMemoryCountdown(endTime);
                this.memoryCountdownInterval = setInterval(() => {
                    this.updateMemoryCountdown(endTime);
                }, 100);

                this.memoryHideTimeout = setTimeout(() => {
                    if (this.isPlaying) {
                        this.ui.hideAllNumbers(this.settings.mode);
                    }
                    this.isMemoryPreview = false;
                    this.stopMemoryCountdown();
                }, this.memoryPreviewDuration);
            }

            stopMemoryHideTimer() {
                if (this.memoryHideTimeout) {
                    clearTimeout(this.memoryHideTimeout);
                    this.memoryHideTimeout = null;
                }
                this.isMemoryPreview = false;
                this.stopMemoryCountdown();
            }

            stopMemoryCountdown() {
                if (this.memoryCountdownInterval) {
                    clearInterval(this.memoryCountdownInterval);
                    this.memoryCountdownInterval = null;
                }
                this.ui.setMemoryCountdownVisible(false);
            }

            updateMemoryCountdown(endTime) {
                const remainingMs = Math.max(0, endTime - Date.now());
                const seconds = (remainingMs / 1000).toFixed(1);
                this.ui.updateMemoryCountdown(`${seconds}с`);
            }

            getCurrentTargetNumber() {
                if (this.settings.direction === 'asc') {
                    return this.currentTargetIndex + 1;
                } else {
                    return this.totalCells - this.currentTargetIndex;
                }
            }

            isGameComplete() {
                return this.currentTargetIndex >= this.totalCells - 1;
            }

            startTimer() {
                this.startTime = Date.now();
                this.timerInterval = setInterval(() => {
                    const elapsed = Date.now() - this.startTime;
                    this.timerDisplay.textContent = this.formatTime(elapsed);
                }, 30);
            }

            stopTimer() {
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
            }

            formatTime(ms) {
                const minutes = Math.floor(ms / 60000);
                const seconds = Math.floor((ms % 60000) / 1000);
                const milliseconds = Math.floor((ms % 1000) / 10);

                const m = minutes.toString().padStart(2, '0');
                const s = seconds.toString().padStart(2, '0');
                const cs = milliseconds.toString().padStart(2, '0');

                return `${m}:${s}.${cs}`;
            }

            victory() {
                this.isPlaying = false;
                const elapsed = Date.now() - this.startTime;
                this.stopTimer();
                this.ui.setControlsState(true);

                this.leaderboard.push({
                    name: this.playerName,
                    timeMs: elapsed,
                    date: new Date().toISOString(),
                    mode: this.settings.mode,
                    size: this.gridSize
                });
                localStorage.setItem('mosaic_leaderboard', JSON.stringify(this.leaderboard));

                this.ui.updateUIVisibility('victory', { finalTime: elapsed });
            }

            quitGame() {
                this.resetGame();
            }

            resetGame() {
                this.isPlaying = false;
                this.stopTimer();
                this.stopMemoryHideTimer();
                this.ui.setControlsState(true);
                this.ui.updateUIVisibility('start');
            }
        }

        function initializeUI(game) {
            const DOM = {
                gridContainer: document.getElementById('grid-container'),
                timerDisplay: document.getElementById('timer'),
                targetDisplay: document.getElementById('target-num'),
                memoryTimer: document.getElementById('memory-timer'),
                memoryCountdown: document.getElementById('memory-countdown'),
                // Controls
                sidebar: document.querySelector('.sidebar'),
                btnGrid: document.getElementById('btn-grid'),
                btnMosaic: document.getElementById('btn-mosaic'),
                gridSizeSlider: document.getElementById('grid-size'),
                gridSizeVal: document.getElementById('grid-size-val'),
                btnAsc: document.getElementById('btn-asc'),
                btnDesc: document.getElementById('btn-desc'),
                checkMark: document.getElementById('check-mark'),
                checkMemory: document.getElementById('check-memory'),
                colorControls: document.getElementById('color-controls'),
                colorThemeDescription: document.getElementById('color-theme-description'),
                // Screens
                startScreen: document.getElementById('start-screen'),
                victoryModal: document.getElementById('victory-modal'),
                // Player Info
                playerNameInput: document.getElementById('player-name'),
                // Buttons
                btnStartGame: document.getElementById('btn-start-game'),
                btnModalRestart: document.getElementById('btn-modal-restart'),
                btnModalQuit: document.getElementById('btn-modal-quit'),
                // Leaderboard
                leaderboardBody: document.getElementById('leaderboard-body'),
                lbBtnGrid: document.getElementById('lb-btn-grid'),
                lbBtnMosaic: document.getElementById('lb-btn-mosaic'),
                finalTime: document.getElementById('final-time'),
            };

            // --- Event Listeners ---
            DOM.btnStartGame.addEventListener('click', () => game.init(true));
            DOM.btnModalRestart.addEventListener('click', () => game.init(true));
            DOM.btnModalQuit.addEventListener('click', () => game.quitGame());

            DOM.btnGrid.addEventListener('click', () => setGameMode('grid'));
            DOM.btnMosaic.addEventListener('click', () => setGameMode('mosaic'));

            DOM.gridSizeSlider.addEventListener('input', (e) => {
                if (game.isPlaying) return;
                const val = parseInt(e.target.value, 10);
                game.gridSize = val;
                DOM.gridSizeVal.textContent = `${val}x${val} (${val * val})`;
                updateDirectionLabels(game.totalCells);
            });

            DOM.btnAsc.addEventListener('click', () => setDirection('asc'));
            DOM.btnDesc.addEventListener('click', () => setDirection('desc'));

            DOM.checkMark.addEventListener('change', (e) => game.settings.markFound = e.target.checked);
            DOM.checkMemory.addEventListener('change', (e) => game.settings.memoryMode = e.target.checked);

            DOM.colorControls.addEventListener('click', (e) => {
                const btn = e.target.closest('.toggle-btn');
                if (!btn) return;
                setColorMode(btn.dataset.value);
            });

            DOM.lbBtnGrid.addEventListener('click', () => renderLeaderboard('grid'));
            DOM.lbBtnMosaic.addEventListener('click', () => renderLeaderboard('mosaic'));

            DOM.playerNameInput.value = game.playerName;
            DOM.playerNameInput.addEventListener('input', (e) => {
                game.playerName = e.target.value || 'Игрок 1';
                localStorage.setItem('mosaic_player_name', game.playerName);
            });


            // --- UI Update Functions ---

            function updateUIVisibility(state, payload = {}) {
                if (state === 'start') {
                    DOM.startScreen.style.display = 'flex';
                    DOM.gridContainer.style.display = 'none';
                    DOM.victoryModal.classList.add('hidden');
                    document.body.classList.remove('game-active');
                    DOM.memoryTimer.classList.add('is-hidden');
                    renderLeaderboard(game.settings.mode);
                    updateDirectionLabels(game.totalCells);
                } else if (state === 'game') {
                    DOM.startScreen.style.display = 'none';
                    DOM.gridContainer.style.display = 'block';
                    DOM.victoryModal.classList.add('hidden');
                    document.body.classList.add('game-active');
                } else if (state === 'victory') {
                    DOM.victoryModal.classList.remove('hidden');
                    DOM.memoryTimer.classList.add('is-hidden');
                    if (payload.finalTime) {
                        DOM.finalTime.textContent = game.formatTime(payload.finalTime);
                    }
                }
            }

            function setGameMode(mode) {
                if (game.isPlaying) return;
                game.settings.mode = mode;
                DOM.btnGrid.classList.toggle('active', mode === 'grid');
                DOM.btnMosaic.classList.toggle('active', mode === 'mosaic');
                if (DOM.startScreen.style.display !== 'none') {
                    renderLeaderboard(mode);
                }
            }

            function setDirection(dir) {
                if (game.isPlaying) return;
                game.settings.direction = dir;
                DOM.btnAsc.classList.toggle('active', dir === 'asc');
                DOM.btnDesc.classList.toggle('active', dir === 'desc');
            }

            function setColorMode(mode) {
                if (game.isPlaying) return;
                game.settings.colorMode = mode;
                document.querySelectorAll('#color-controls .toggle-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.value === mode);
                });
                updateColorThemeDescription();
            }

            function updateColorThemeDescription() {
                const activeButton = DOM.colorControls.querySelector('.toggle-btn.active');
                if (activeButton && DOM.colorThemeDescription) {
                    DOM.colorThemeDescription.textContent = activeButton.dataset.description || '';
                } else if (DOM.colorThemeDescription) {
                    DOM.colorThemeDescription.textContent = '';
                }
            }

            function updateDirectionLabels(totalCells) {
                DOM.btnAsc.textContent = `1 ➔ ${totalCells}`;
                DOM.btnDesc.textContent = `${totalCells} ➔ 1`;
            }

            function renderLeaderboard(filterMode) {
                DOM.lbBtnGrid.classList.toggle('active', filterMode === 'grid');
                DOM.lbBtnMosaic.classList.toggle('active', filterMode === 'mosaic');

                const scores = game.leaderboard
                    .filter(entry => entry.mode === filterMode)
                    .sort((a, b) => a.timeMs - b.timeMs)
                    .slice(0, 10);

                if (scores.length === 0) {
                    DOM.leaderboardBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#64748b">Нет результатов</td></tr>';
                    return;
                }

                DOM.leaderboardBody.innerHTML = scores.map((entry, index) => {
                    const sizeInfo = entry.size ? ` <span style="font-size:0.8em; opacity:0.7">(${entry.size}x${entry.size})</span>` : '';
                    let rankClass = '';
                    if (index === 0) rankClass = 'rank-gold';
                    if (index === 1) rankClass = 'rank-silver';
                    if (index === 2) rankClass = 'rank-bronze';

                    return `
                        <tr class="${rankClass}">
                            <td>${index + 1}</td>
                            <td>${entry.name}${sizeInfo}</td>
                            <td>${game.formatTime(entry.timeMs)}</td>
                        </tr>
                    `;
                }).join('');
            }

            function setControlsState(enabled) {
                DOM.sidebar.classList.toggle('disabled', !enabled);
            }

            function updateTargetDisplay(target) {
                DOM.targetDisplay.textContent = target;
            }

            function updateMemoryCountdown(text) {
                DOM.memoryCountdown.textContent = text;
            }

            function setMemoryCountdownVisible(visible) {
                DOM.memoryTimer.classList.toggle('is-hidden', !visible);
            }

            function renderGrid(game) {
                DOM.gridContainer.innerHTML = '';
                DOM.gridContainer.style.gridTemplateColumns = `repeat(${game.gridSize}, 1fr)`;
                DOM.gridContainer.style.display = 'grid';
                const shuffledColors = [...game.colors];
                game.shuffle(shuffledColors);

                game.numbers.forEach((num, index) => {
                    const cell = document.createElement('div');
                    cell.classList.add('grid-cell');
                    cell.textContent = num;
                    cell.dataset.number = num;

                    let bg, text;
                    const mode = game.settings.colorMode;

                    if (mode === 'bw') {
                        bg = '#334155'; text = '#ffffff';
                    } else if (mode === 'bg') {
                        bg = shuffledColors[index % shuffledColors.length]; text = '#ffffff';
                    } else if (mode === 'text') {
                        bg = '#1e293b'; text = shuffledColors[index % shuffledColors.length];
                    } else if (mode === 'full') {
                        bg = shuffledColors[index % shuffledColors.length];
                        let textIdx = (index + 3) % shuffledColors.length;
                        if (shuffledColors[textIdx] === bg) textIdx = (textIdx + 1) % shuffledColors.length;
                        text = shuffledColors[textIdx];
                    }

                    cell.style.backgroundColor = bg;
                    cell.style.color = text;
                    cell.style.transition = 'color 0.3s, background-color 0.3s, transform 0.2s';
                    const fontSize = Math.max(1, 2.5 - (game.gridSize * 0.1));
                    cell.style.fontSize = `${fontSize}rem`;

                    cell.addEventListener('click', () => game.handleCellClick(cell, num));
                    DOM.gridContainer.appendChild(cell);
                });
            }

            function renderMosaic(game) {
                DOM.gridContainer.innerHTML = '';
                DOM.gridContainer.style.display = 'block';
                const width = 600, height = 600;
                const shuffledColors = [...game.colors];
                game.shuffle(shuffledColors);

                let points = Array.from({ length: game.totalCells }, () => [Math.random() * width, Math.random() * height]);
                const delaunay = d3.Delaunay.from(points);
                const voronoi = delaunay.voronoi([0, 0, width, height]);

                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
                svg.classList.add("mosaic-svg");

                game.numbers.forEach((num, i) => {
                    const pathStr = voronoi.renderCell(i);
                    const polygon = voronoi.cellPolygon(i);
                    const centroid = d3.polygonCentroid(polygon);

                    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");

                    let bg, textCol;
                    const mode = game.settings.colorMode;

                    if (mode === 'bw') {
                        bg = '#334155'; textCol = '#ffffff';
                    } else if (mode === 'bg') {
                        bg = shuffledColors[i % shuffledColors.length]; textCol = '#ffffff';
                    } else if (mode === 'text') {
                        bg = '#1e293b'; textCol = shuffledColors[i % shuffledColors.length];
                    } else if (mode === 'full') {
                        bg = shuffledColors[i % shuffledColors.length];
                        let textIdx = (i + 5) % shuffledColors.length;
                        if (shuffledColors[textIdx] === bg) textIdx = (textIdx + 1) % shuffledColors.length;
                        textCol = shuffledColors[textIdx];
                    }

                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute('d', pathStr);
                    path.classList.add("mosaic-path");
                    path.dataset.number = num;
                    path.style.fill = bg;
                    path.style.stroke = '#1e293b';

                    path.addEventListener('click', () => game.handleCellClick(path, num));

                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", centroid[0]);
                    text.setAttribute("y", centroid[1]);
                    text.textContent = num;
                    text.classList.add("mosaic-text");
                    text.style.fill = textCol;

                    const randomScale = 0.8 + Math.random() * 1.5;
                    const baseSize = 200 / game.gridSize;
                    text.style.fontSize = `${baseSize * randomScale}px`;
                    text.setAttribute("transform", `rotate(${(Math.random() - 0.5) * 60}, ${centroid[0]}, ${centroid[1]})`);

                    group.append(path, text);
                    svg.appendChild(group);
                });
                DOM.gridContainer.appendChild(svg);
            }

            function markCell(element) {
                element.classList.add('marked');
                if (game.settings.memoryMode) {
                    if (element.classList.contains('grid-cell')) {
                        element.classList.remove('hidden-text');
                    } else if (element.tagName === 'path') {
                        const group = element.parentElement;
                        const textEl = group.querySelector('text');
                        if (textEl) textEl.classList.remove('hidden-text');
                    }
                }
            }

            function shakeCell(element) {
                element.classList.add('shake');
                setTimeout(() => element.classList.remove('shake'), 400);
            }

            function hideAllNumbers(mode) {
                if (mode === 'grid') {
                    document.querySelectorAll('.grid-cell:not(.marked)').forEach(el => el.classList.add('hidden-text'));
                } else {
                    document.querySelectorAll('.mosaic-path:not(.marked) + .mosaic-text').forEach(el => el.classList.add('hidden-text'));
                }
            }

            function showAllNumbers() {
                document.querySelectorAll('.hidden-text').forEach(el => el.classList.remove('hidden-text'));
            }

            function revealNumberTemporarily(element) {
                if (element.classList.contains('grid-cell')) {
                    element.classList.remove('hidden-text');
                    setTimeout(() => {
                        if (game.isPlaying && !element.classList.contains('marked')) {
                            element.classList.add('hidden-text');
                        }
                    }, 1000);
                } else if (element.tagName === 'path') {
                    const group = element.parentElement;
                    const textEl = group.querySelector('text');
                    if (textEl) {
                        textEl.classList.remove('hidden-text');
                        setTimeout(() => {
                            if (game.isPlaying) {
                                textEl.classList.add('hidden-text');
                            }
                        }, 1000);
                    }
                }
            }

            function resetAllCells(mode, isMemory) {
                if (mode === 'grid') {
                    document.querySelectorAll('.grid-cell').forEach(el => {
                        el.classList.remove('marked');
                        if (isMemory) el.classList.add('hidden-text');
                    });
                } else {
                    document.querySelectorAll('.mosaic-path').forEach(path => {
                        path.classList.remove('marked');
                        if (isMemory) {
                            const textEl = path.parentElement.querySelector('text');
                            if (textEl) textEl.classList.add('hidden-text');
                        }
                    });
                }
            }

            updateColorThemeDescription();

            // Expose functions needed by Game class
            return {
                updateUIVisibility,
                setControlsState,
                updateTargetDisplay,
                updateMemoryCountdown,
                setMemoryCountdownVisible,
                renderGrid,
                renderMosaic,
                markCell,
                shakeCell,
                hideAllNumbers,
                showAllNumbers,
                revealNumberTemporarily,
                resetAllCells,
            };
        }

        // Basic error handling for D3.js
        if (typeof d3 === 'undefined') {
            alert("Ошибка: Библиотека D3.js не загружена. Проверьте интернет-соединение.");
            document.body.innerHTML = '<h1 style="color: white; text-align: center; padding-top: 50px;">Не удалось загрузить D3.js.</h1>';
            throw new Error("D3.js is not loaded");
        }

        // Main application entry point
        document.addEventListener('DOMContentLoaded', () => {
            const game = new Game();
            const ui = initializeUI(game);
            game.ui = ui; // Provide the UI methods to the game instance

            // Initial setup to show the start screen
            game.resetGame();

            // Expose for debugging
            window.game = game;
        });
    </script>
